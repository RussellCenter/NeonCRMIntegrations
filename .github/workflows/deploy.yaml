name: deploy-cloud-run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/108548461925/locations/global/workloadIdentityPools/wif-gh-neoncrmintegration/providers/provider-gh-neoncrmintegration
          service_account: ci-submit-neoncrmintegration@neoncrmintegration.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: neoncrmintegration

      - name: Validate image tag
        run: |
          TAG="${{ github.sha }}"
          test -n "${TAG}"
          echo "${TAG}" | grep -E '^[0-9a-f]{40}$'

      - name: Submit Cloud Build
        run: |
          gcloud builds submit \
            --config cloudbuild.yaml \
            --substitutions=_IMAGE_TAG=${{ github.sha }}
